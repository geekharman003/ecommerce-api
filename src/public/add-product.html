<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Product</title>
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <nav>
        <ul>
          <li><a href="./shop.html">Shop</a></li>
          <li><a href="./products.html">Products</a></li>
          <li><a href="./cart.html">Cart</a></li>
          <li><a href="./orders.html">Orders</a></li>
          <li><a href="./add-product.html">Add Product</a></li>
          <li><a href="./admin-products.html">Admin Products</a></li>
          <li onclick="logout()"><a href="#">Logout</a></li>
        </ul>
      </nav>
    </header>
    <form onsubmit="addProduct(event,'non-admin')" class="add-product-form">
      <label for="title">Title:</label>
      <br />
      <input type="text" id="title" name="title" required />
      <br />
      <br />
      <label for="description">Description:</label>
      <br />
      <textarea
        type="text"
        id="description"
        name="description"
        cols="30"
        rows="5"
        required
      ></textarea>
      <br />
      <br />
      <label for="price">Price:</label>
      <br />
      <input type="number" id="price" name="price" min="10" required />
      <br />
      <br />
      <label for="imageUrl">Image Url:</label>
      <br />
      <input type="url" id="imageUrl" name="imageUrl" />
      <br />
      <br />
      <label for="stock">Stock:</label>
      <input type="number" id="stock" name="stock" min="1" required />
      <br /><br />

      <button type="submit">Add Product</button>
    </form>
    <script src="verifyToken.js"></script>
    <script
      type="text/javascript"
      src="https://cdn.jsdelivr.net/npm/toastify-js"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
